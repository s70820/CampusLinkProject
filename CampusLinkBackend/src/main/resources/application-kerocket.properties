# Kerocket / Tomcat 9 profile — DB comes from JNDI (docker-entrypoint.sh writes jdbc/appDB).

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=false

logging.level.org.springframework=WARN
logging.level.com.campuslink=INFO

spring.datasource.jndi-name=java:comp/env/jdbc/appDB

app.frontend.url=${FRONTEND_URL:https://localhost}
app.upload.base-dir=${UPLOAD_DIR:/tmp/campuslink-uploads}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
