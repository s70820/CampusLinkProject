# Local dev secrets only (prod uses cursor-deploy.properties via application-prod)
spring.config.import=optional:file:application-local.properties

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/campuslink?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration,classpath:com/campuslink/campuslinkbackend/migration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
logging.level.org.springframework=DEBUG
logging.level.com.campuslink=DEBUG

# Mail (set MAIL_USERNAME and MAIL_PASSWORD in environment)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:sarahdemo335@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

app.frontend.url=${FRONTEND_URL:http://localhost:3000}
app.password-reset.expiry-minutes=${PASSWORD_RESET_EXPIRY_MINUTES:60}
app.mail.from=${MAIL_FROM:sarahdemo335@gmail.com}
app.upload.base-dir=${UPLOAD_DIR:uploads}

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=30MB