# Production profile for CURSOR Tomcat (activated via cursor-deploy.properties)

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=false

logging.level.org.springframework=WARN
logging.level.com.campuslink=INFO

app.frontend.url=${FRONTEND_URL:https://s70820.cursor.umt.edu.my}
app.upload.base-dir=${UPLOAD_DIR:/home/s70820/uploads}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}

# CURSOR DB credentials — must load LAST (overrides must not reset user/password to root)
spring.config.import=optional:classpath:cursor-deploy.properties
